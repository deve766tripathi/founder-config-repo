spring:
  datasource:
    url: jdbc:mysql://localhost:3306/startup_db
    username: root
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# ✅ FINAL SWAGGER CONFIG (LOCK THIS)
springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html
    config-url: /v3/api-docs   # 🔥 IMPORTANT (NO /startup here)

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: startup-service:8082
